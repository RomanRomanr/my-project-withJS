<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/product-modal.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="modal is-open">
      <div class="modal-overlay"></div>

      <div class="modal-window">
        <button class="modal-close" type="button">×</button>

        <div class="modal-body">
          <div class="modal-gallery">
            <img
              class="modal-main-image"
              src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1400&q=80"
              alt="Головне фото товару"
            />

            <div class="modal-small-images">
              <img
                class="modal-small-image"
                src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=900&q=80"
                alt="Додаткове фото 1"
              />

              <img
                class="modal-small-image"
                src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=900&q=80"
                alt="Додаткове фото 2"
              />
            </div>
          </div>

          <div class="modal-info">
            <h2 class="modal-title">Софа Oslo</h2>
            <p class="modal-category">Дивани</p>
            <p class="modal-price">9 999 грн</p>

            <div class="modal-rating">
              <span>★</span>
              <span>★</span>
              <span>★</span>
              <span>★</span>
              <span class="modal-star--empty">★</span>
            </div>

            <div class="modal-colors-block">
              <p class="modal-label">Колір</p>

              <div class="modal-colors">
                <button
                  class="modal-color modal-color-ray"
                  type="button"
                  aria-label="Сірий"
                ></button>
                <button
                  class="modal-color modal-color-beige"
                  type="button"
                  aria-label="Бежевий"
                ></button>
                <button
                  class="modal-color modal-color-black"
                  type="button"
                  aria-label="Чорний"
                ></button>
              </div>
            </div>

            <div class="modal-description">
              <p>
                Класичний диван з м'якими подушками та високою спинкою,
                ідеальний для сімейного відпочинку.
              </p>
              <p>Оббивка з якісної зносостійкої тканини.</p>
            </div>

            <p class="modal-size">Розміри: 280x180x85</p>

            <button class="modal-button" type="button">
              Перейти до замовлення
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
